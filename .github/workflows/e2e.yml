name: E2E Tests

on:
  push:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright dependencies
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Start services with docker-compose
        run: docker compose up -d --build --wait
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Wait for web service to be ready
        run: |
          echo "Waiting for web service on http://localhost:3000..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 2; done'
          echo "Web service is ready."

      - name: Wait for API service to be ready
        run: |
          echo "Waiting for API service on http://localhost:8000..."
          timeout 120 bash -c 'until curl -sf http://localhost:8000/docs > /dev/null 2>&1; do sleep 2; done'
          echo "API service is ready."

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test
        env:
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Tear down services
        if: always()
        run: docker compose down -v
