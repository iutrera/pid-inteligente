name: CI Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        package:
          - pid-converter
          - pid-knowledge-graph
          - pid-rag

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packages/${{ matrix.package }}/pyproject.toml

      - name: Install dependencies
        working-directory: packages/${{ matrix.package }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install sibling packages (pid-rag only)
        if: matrix.package == 'pid-rag'
        run: |
          pip install -e packages/pid-converter
          pip install -e packages/pid-knowledge-graph

      - name: Run ruff check
        working-directory: packages/${{ matrix.package }}
        run: ruff check .

      - name: Run ruff format check
        working-directory: packages/${{ matrix.package }}
        run: ruff format --check .

      - name: Run pytest
        working-directory: packages/${{ matrix.package }}
        run: pytest --tb=short -v --cov=src/ --cov-report=term-missing
