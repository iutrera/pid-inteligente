services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-pidinteligente}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
      - ./docker/neo4j/init.cypher:/docker-entrypoint-initdb.d/init.cypher
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u $${NEO4J_USER:-neo4j} -p $${NEO4J_PASSWORD:-pidinteligente} 'RETURN 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-pidinteligente}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  neo4j-data:
