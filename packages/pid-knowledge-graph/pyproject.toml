[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pid-knowledge-graph"
version = "0.1.0"
description = "Knowledge Graph builder for P&ID diagrams: pyDEXPI to NetworkX to Neo4j with multi-level condensation"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "lxml>=5.0",
    "networkx>=3.0",
    "neo4j>=5.0",
    "pydantic>=2.0",
    "pydexpi>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pid_knowledge_graph"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
asyncio_mode = "auto"

[tool.ruff]
extend = "../../ruff.toml"
