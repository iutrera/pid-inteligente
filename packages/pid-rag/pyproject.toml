[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pid-rag"
version = "0.1.0"
description = "FastAPI backend with Graph-RAG for querying P&ID Knowledge Graphs using Claude LLM"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "anthropic>=0.25",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "neo4j>=5.0",
    "sse-starlette>=2.0",
    "python-multipart>=0.0.9",
    "pid-converter",
    "pid-knowledge-graph",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pid_rag"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
asyncio_mode = "auto"

[tool.ruff]
extend = "../../ruff.toml"
